<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Entregas Pro - SP</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="sidebar">
        <span id="save-status">✓ Salvo</span>
        <h3>Mapa de Entregas Pro</h3>

        <div class="search-box base-box">
            <strong>🏠 Ponto de Partida (Base)</strong>
            <input type="text" id="base-address" placeholder="Endereço da sua loja">
            <button class="btn-action btn-base" onclick="setBase()">Definir Base</button>
        </div>

        <div class="search-box consult-box">
            <strong>📍 Consultar Cliente</strong>
            <input type="text" id="check-address" placeholder="Endereço do cliente">
            <button class="btn-action btn-check" onclick="checkAddress()">Localizar e Calcular</button>
            <div id="result-calc"></div>
        </div>

        <hr>

        <h4>1. Selecione o Dia para Marcar</h4>
        <div class="day-grid">
            <button class="day-btn" id="btn-seg" onclick="selectDay('Segunda', '#d9534f', this)">Seg</button>
            <button class="day-btn" id="btn-ter" onclick="selectDay('Terça', '#5cb85c', this)">Ter</button>
            <button class="day-btn" id="btn-qua" onclick="selectDay('Quarta', '#428bca', this)">Qua</button>
            <button class="day-btn" id="btn-qui" onclick="selectDay('Quinta', '#f0ad4e', this)">Qui</button>
            <button class="day-btn" id="btn-sex" onclick="selectDay('Sexta', '#9b59b6', this)">Sex</button>
        </div>

        <div id="config-container" class="search-box" style="display:none; margin-top: 15px;">
            <strong>Configurar <span id="display-day">...</span></strong>
            <input type="text" id="bairro-input" placeholder="Nome do Bairro ou Região">
            
            <div class="pricing-group">
                <label>Tipo de Cobrança:</label>
                <select id="pricing-type">
                    <option value="fixed">Taxa Fixa (R$)</option>
                    <option value="km">Por Distância (R$/km)</option>
                </select>
                <input type="number" id="price-value" placeholder="Valor (ex: 10.00)">
            </div>

            <button class="btn-action btn-add" onclick="searchBairro()">Salvar Bairro Oficial</button>
            <p class="hint">Ou use a ferramenta de desenho no mapa.</p>
        </div>

        <div class="backup-section">
            <button class="btn-action btn-backup" onclick="exportData()">📥 Exportar Backup</button>
            <button class="btn-action btn-clear" onclick="clearAll()">Apagar Tudo</button>
        </div>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.draw/1.0.4/leaflet.draw.js"></script>
    <script src="script.js"></script>
</body>
</html>
